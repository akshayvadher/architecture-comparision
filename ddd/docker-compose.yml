services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ddd
      POSTGRES_PASSWORD: ddd_local
      POSTGRES_DB: ddd_bank
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  pgdata:
