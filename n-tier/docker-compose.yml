services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ntier
      POSTGRES_PASSWORD: ntier_local
      POSTGRES_DB: ntier_bank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  pgdata:
