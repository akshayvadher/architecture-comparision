services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clean
      POSTGRES_PASSWORD: clean_local
      POSTGRES_DB: clean_bank
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  pgdata:
