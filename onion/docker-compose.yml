services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onion
      POSTGRES_PASSWORD: onion_local
      POSTGRES_DB: onion_bank
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

volumes:
  pgdata:
